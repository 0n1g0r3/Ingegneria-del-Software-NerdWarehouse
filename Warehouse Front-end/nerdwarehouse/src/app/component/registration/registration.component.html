<!-- registration.component.html -->
<div style="background-color: blueviolet;">
  <div class="registration-container">
    <h2>Registrazione</h2>
    <form>
    <div class="form-group">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" [(ngModel)]="user.firstname" name="nome" placeholder="Inserisci il tuo nome" required>
    </div>
    <div class="form-group">
      <label for="cognome">Cognome:</label>
      <input type="text" id="cognome" [(ngModel)]="user.lastname" name="cognome" placeholder="Inserisci il tuo cognome" required>
    </div>
    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" [(ngModel)]="user.email" name="email" placeholder="Inserisci la tua email" required>
    </div>
    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" id="password" [(ngModel)]="user.password" name="password" placeholder="Inserisci la tua password" required>
    </div>
    <div class="form-group">
      <label for="confermaPassword">Conferma Password:</label>
      <input type="password" id="confermaPassword"  name="confermaPassword" placeholder="Conferma la tua password" required>
    </div>
    <button type="submit"(click)= 'registrazione()'>Registrati</button>
  </form>
</div>
</div>
